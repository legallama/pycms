{% extends "admin/base.html" %}

{% block title %}New menu{% endblock %}
{% block page_title %}New menu{% endblock %}

{% block content %}
  <div class="uk-card uk-card-default uk-card-body uk-width-1-1 uk-width-1-2@l">
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="uk-margin">
        <label class="uk-form-label" for="name">Name</label>
        <div class="uk-form-controls">
          <input class="uk-input" id="name" name="name" placeholder="Main menu" required>
        </div>
      </div>
      <div class="uk-margin uk-flex uk-flex-between">
        <a class="uk-button uk-button-default" href="{{ url_for('site.menus_list') }}">Cancel</a>
        <button class="uk-button uk-button-primary" type="submit">Create</button>
      </div>
    </form>
  </div>
{% endblock %}
