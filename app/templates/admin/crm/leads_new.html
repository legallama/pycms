{% extends "admin/base.html" %}

{% block title %}New lead{% endblock %}
{% block page_title %}New lead{% endblock %}

{% block content %}
  <div class="uk-card uk-card-default uk-card-body uk-width-1-1 uk-width-1-2@l">
    <form method="post">
      {{ csrf_token() }}

      <div class="uk-margin">
        <label class="uk-form-label">Contact</label>
        <select class="uk-select" name="contact_id" required>
          <option value="">Select contact…</option>
          {% for c in contacts %}
            <option value="{{ c.id }}">{{ c.name }}{% if c.company %} ({{ c.company }}){% endif %}</option>
          {% endfor %}
        </select>
      </div>

      <div class="uk-grid-small uk-child-width-1-2@m" uk-grid>
        <div>
          <label class="uk-form-label">Stage</label>
          <select class="uk-select" name="stage">
            {% for s in stages %}
              <option value="{{ s }}">{{ s }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="uk-form-label">Owner</label>
          <select class="uk-select" name="owner_id">
            <option value="">Unassigned</option>
            {% for u in users %}
              <option value="{{ u.id }}">{{ u.email }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="uk-grid-small uk-child-width-1-2@m" uk-grid>
        <div>
          <label class="uk-form-label">Source</label>
          <input class="uk-input" name="source" placeholder="Website, referral, etc">
        </div>
        <div>
          <label class="uk-form-label">Value</label>
          <input class="uk-input" name="value" type="number" min="0" placeholder="Optional">
        </div>
      </div>

      <div class="uk-margin uk-flex uk-flex-between">
        <a class="uk-button uk-button-default" href="{{ url_for('crm.crm_dashboard') }}">Back</a>
        <button class="uk-button uk-button-primary" type="submit">Create</button>
      </div>
    </form>
  </div>
{% endblock %}
