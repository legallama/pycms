{% extends "journal/templates/base.html" %}
{% block main_content %}
    <div uk-grid>
        <div class="uk-width-expand">
            {% block content %}{% endblock %}
        </div>
        {% set sidebar = render_position("sidebar") %}
        {% if sidebar or request.args.get('preview') == '1' %}
        <aside class="uk-width-1-4@m">
            {{ sidebar }}
        </aside>
        {% endif %}
    </div>
{% endblock %}
