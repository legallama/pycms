{% extends "journal/templates/layouts/default.html" %}
{% block title %}Blog{% endblock %}
{% block content %}
    <h1 class="uk-article-title">Archives</h1>
    {% for post in posts %}
        <article class="uk-article uk-margin-large-bottom">
            <h2 class="uk-h3"><a class="uk-link-reset" href="/blog/{{ post.slug }}">{{ post.title }}</a></h2>
            <p class="uk-article-meta">{{ post.updated_at.strftime('%Y-%m-%d') }}</p>
        </article>
    {% endfor %}
{% endblock %}
